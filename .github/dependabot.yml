version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    ignore:
      # Block major version update PRs globally (security updates may still be opened as needed)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    groups:
      weekly-minor-patch-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"